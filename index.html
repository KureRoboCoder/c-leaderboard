<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>c-judge :: leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-2: #171c27;
    --border: #232838;
    --text: #d7dce5;
    --text-muted: #6b7280;
    --accent: #7aa2f7;
    --ac: #4fd1a5;
    --ac-dim: #1c3b30;
    --wa: #f2795e;
    --wa-dim: #3a231e;
    --ce: #f2b84f;
    --ce-dim: #3a3220;
    --tle: #b892f2;
    --tle-dim: #2b2440;
    --none: #1a1e29;
    --none-border: #262b38;
    --radius: 8px;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    padding: 32px 20px 80px;
    min-height: 100vh;
  }

  .wrap {
    max-width: 780px;
    margin: 0 auto;
  }

  /* --- signature: terminal window chrome --- */
  .term {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }

  .term-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #f2795e; }
  .dot.y { background: #f2b84f; }
  .dot.g { background: #4fd1a5; }

  .term-title {
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .term-body { padding: 22px 22px 26px; }

  .prompt {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 22px;
    word-break: break-all;
  }
  .prompt .sigil { color: var(--ac); }
  .prompt .cmd { color: var(--text); }
  .prompt .arg { color: var(--accent); }

  h1 {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .sub {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }

  /* --- username control --- */
  .userbox {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .userbox input {
    flex: 1;
    background: var(--none);
    border: 1px solid var(--none-border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
  }
  .userbox input:focus-visible,
  .userbox button:focus-visible,
  th button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .userbox button {
    background: var(--accent);
    color: #0b0e14;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .userbox button:hover { filter: brightness(1.08); }

  /* --- stats row --- */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    flex: 1;
    background: var(--none);
    border: 1px solid var(--none-border);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .stat .n {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
  }
  .stat .n.ac-text { color: var(--ac); }
  .stat .l {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* --- grid table --- */
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-align: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; width: 64px; }

  tbody th {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    padding: 6px 10px 6px 2px;
    color: var(--text);
    white-space: nowrap;
  }
  tbody th .qnum {
    display: inline-block;
    min-width: 34px;
    color: var(--text);
  }
  tbody th .qtitle {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 4px;
  }
  tbody th a.qlink {
    color: var(--accent);
    text-decoration: none;
  }
  tbody th a.qlink:hover { text-decoration: underline; }

  td {
    padding: 5px;
    text-align: center;
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 38px;
    border-radius: 6px;
    border: 1px solid var(--none-border);
    background: var(--none);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: default;
  }
  .cell.ac { background: var(--ac-dim); border-color: var(--ac); color: var(--ac); }
  .cell.wa { background: var(--wa-dim); border-color: var(--wa); color: var(--wa); }
  .cell.ce { background: var(--ce-dim); border-color: var(--ce); color: var(--ce); }
  .cell.tle { background: var(--tle-dim); border-color: var(--tle); color: var(--tle); }

  .table-scroll { overflow-x: auto; }

  /* --- empty / error states --- */
  .notice {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    background: var(--none);
    border: 1px dashed var(--none-border);
    border-radius: 6px;
    padding: 18px;
    line-height: 1.7;
  }
  .notice strong { color: var(--text); }

  .legend {
    display: flex;
    gap: 18px;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .swatch.ac { background: var(--ac); }
  .swatch.wa { background: var(--wa); }
  .swatch.ce { background: var(--ce); }
  .swatch.tle { background: var(--tle); }
  .swatch.none { background: var(--none); border: 1px solid var(--none-border); }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 24px;
    font-family: var(--mono);
  }
  footer a { color: var(--text-muted); }

  @media (max-width: 480px) {
    body { padding: 20px 12px 60px; }
    .stats { flex-wrap: wrap; }
    .stat { min-width: 45%; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="term">
    <div class="term-bar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="term-title">c-judge — leaderboard</span>
    </div>
    <div class="term-body">
      <div class="prompt">
        <span class="sigil">$</span>
        <span class="cmd">./judge --user</span>
        <span class="arg" id="promptUser">(未入力)</span>
      </div>

      <h1>自分の成績</h1>
      <p class="sub">GitHubのユーザー名を入力すると、提出済みの問題が一覧表示されます。</p>

      <div class="userbox">
        <input id="userInput" type="text" placeholder="GitHubユーザー名 (例: tanaka123)" autocomplete="off" spellcheck="false">
        <button id="loadBtn">表示</button>
      </div>

      <div id="statsArea"></div>
      <div id="content">
        <p class="notice">ユーザー名を入力して「表示」を押してください。</p>
      </div>

      <div class="legend">
        <span><span class="swatch ac"></span>AC(正解)</span>
        <span><span class="swatch wa"></span>WA(不正解)</span>
        <span><span class="swatch ce"></span>CE(コンパイルエラー)</span>
        <span><span class="swatch tle"></span>TLE(時間切れ)</span>
        <span><span class="swatch none"></span>未提出</span>
      </div>
    </div>
  </div>
  <footer>results/&lt;user&gt;.json を problems.json の定義に沿って描画しています</footer>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const userInput = $('#userInput');
const promptUser = $('#promptUser');
const content = $('#content');
const statsArea = $('#statsArea');

const LETTERS = ['A', 'B', 'C'];

function getInitialUser() {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('user');
  if (fromUrl) return fromUrl;
  return localStorage.getItem('cjudge_username') || '';
}

function setNotice(html) {
  content.innerHTML = `<p class="notice">${html}</p>`;
  statsArea.innerHTML = '';
}

async function loadJSON(path) {
  const res = await fetch(path, { cache: 'no-store' });
  if (!res.ok) throw new Error(String(res.status));
  return res.json();
}

async function render(username) {
  username = username.trim();
  promptUser.textContent = username || '(未入力)';

  if (!username) {
    setNotice('ユーザー名を入力して「表示」を押してください。');
    return;
  }

  localStorage.setItem('cjudge_username', username);
  const url = new URL(location.href);
  url.searchParams.set('user', username);
  history.replaceState(null, '', url);

  setNotice('読み込み中...');

  let problems;
  try {
    problems = (await loadJSON('problems.json')).problems;
  } catch (e) {
    setNotice('<strong>問題一覧(problems.json)が読み込めませんでした。</strong><br>リポジトリ直下に problems.json が置かれているか確認してください。');
    return;
  }

  let results = {};
  let hasResultFile = true;
  try {
    results = await loadJSON(`results/${encodeURIComponent(username)}.json`).results;
  } catch (e) {
    hasResultFile = false;
  }

  if (!hasResultFile) {
    setNotice(`<strong>${username}</strong> さんの提出記録がまだ見つかりません。<br>提出用リポジトリで一度でも push すると、ここに反映されます。`);
    return;
  }

  // --- 集計 ---
  let acCount = 0;
  let attemptedCount = 0;
  const total = problems.length * LETTERS.length;
  for (const p of problems) {
    for (const l of LETTERS) {
      const status = results[`Q${p.id}${l}`];
      if (status) attemptedCount++;
      if (status === 'AC') acCount++;
    }
  }

  statsArea.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="n ac-text">${acCount} / ${total}</div><div class="l">AC 数</div></div>
      <div class="stat"><div class="n">${attemptedCount}</div><div class="l">挑戦した問題数</div></div>
      <div class="stat"><div class="n">${total ? Math.round((acCount / total) * 100) : 0}%</div><div class="l">正答率</div></div>
    </div>
  `;

  // --- 表描画 ---
  let thead = '<tr><th></th>' + LETTERS.map(l => `<th>${l}</th>`).join('') + '</tr>';
  let rows = '';
  for (const p of problems) {
    const qLabel = p.url
      ? `<a class="qlink" href="${p.url}" target="_blank" rel="noopener">Q${p.id}</a>`
      : `Q${p.id}`;
    rows += `<tr><th><span class="qnum">${qLabel}</span><span class="qtitle">${p.title || ''}</span></th>`;
    for (const l of LETTERS) {
      const status = results[`Q${p.id}${l}`];
      const cls = status === 'AC' ? 'ac' : status === 'WA' ? 'wa' : status === 'CE' ? 'ce' : status === 'TLE' ? 'tle' : '';
      const label = status || '';
      const title = p.title ? `Q${p.id}${l} — ${p.title}` : `Q${p.id}${l}`;
      rows += `<td><div class="cell ${cls}" title="${title}">${label}</div></td>`;
    }
    rows += '</tr>';
  }

  content.innerHTML = `
    <div class="table-scroll">
      <table>
        <thead>${thead}</thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

$('#loadBtn').addEventListener('click', () => render(userInput.value));
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') render(userInput.value);
});

const initial = getInitialUser();
if (initial) {
  userInput.value = initial;
  render(initial);
} else {
  promptUser.textContent = '(未入力)';
}
</script>
</body>
</html>
