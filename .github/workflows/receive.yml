name: Receive Result
on:
  repository_dispatch:
    types: [submit]

jobs:
  update-firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Firebase Admin SDK
        run: npm install firebase-admin
        
      - name: Update Firestore
        uses: actions/github-script@v7
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        with:
          script: |
            const admin = require('firebase-admin');
            
            // 環境変数から鍵とデータを読み込む
            const serviceAccount = JSON.parse(process.env.FIREBASE_KEY);
            const payload = JSON.parse(process.env.PAYLOAD);
            
            if (!admin.apps.length) {
              admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
            }
            const db = admin.firestore();
            
            // usersコレクションの 'ユーザー名' ドキュメントに成績を書き込む
            // { merge: true } をつけることで、過去の成績を消さずに新しいものだけを上書き・追加してくれます
            await db.collection('users').doc(payload.user).set({
              results: payload.results,
              updatedAt: admin.firestore.FieldValue.serverTimestamp()
            }, { merge: true });