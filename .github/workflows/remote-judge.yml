name: Remote Judge

on:
  workflow_dispatch:
    inputs:
      user:
        required: true
        type: string
      repo:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  judge:
    runs-on: ubuntu-latest
    steps:
      # 0. まず自分自身（c-leaderboard）のコードを取り寄せる (scripts/dist/index.js を取得するため)
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        
      # inputs.xxx という形で受け取るように変更
      - name: Checkout User Code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.sha }}
          path: user_code
          token: ${{ secrets.TESTDATA_TOKEN }}

      # 2. テストデータを取り寄せる (Privateリポジトリなので合鍵を使う)
      - name: Checkout Test Data
        uses: actions/checkout@v4
        with:
          repository: KureRoboCoder/c-testdata
          token: ${{ secrets.TESTDATA_TOKEN }}
          path: testdata

      # 4. コンパイル＆採点
      - name: Compile and Judge (C++)
        id: judge
        run: |
          echo "{}" > payload.json
          RESULTS="{}"
          
          for src in user_code/answers/*.cpp; do
            [ -e "$src" ] || continue
            filename=$(basename "$src" .cpp) # Q1A などを取得
            
            # --- ここが変更点：Q1A を Q1 と A に分割する ---
            q_sub="${filename: -1}"  # 最後の1文字 (例: A)
            q_num="${filename%?}"    # 最後の1文字以外 (例: Q1)
            
            testdir="testdata/$q_num/$q_sub"
            # -----------------------------------------------
            
            if [ ! -d "$testdir" ]; then
              echo "⚠️ [スキップ] $filename : テストデータが見つかりません (探した場所: $testdir)"
              continue
            fi
            
            echo "▶️ [ジャッジ開始] $filename"
            
            # C++ のコンパイル
            if ! g++ -O2 -Wall "$src" -o /tmp/prog; then
              echo "❌ [CE] $filename : コンパイルエラー"
              RESULTS=$(jq --arg k "$filename" --arg v "CE" '.[$k] = $v' <<< "$RESULTS")
              continue
            fi
            
            pass=0; total=0; tle=0; re=0
            for infile in "$testdir"/*.in; do
              [ -e "$infile" ] || continue
              total=$((total+1))
              expected_file="${infile%.in}.out"
              
              status=0
              timeout 3 /tmp/prog < "$infile" > /tmp/actual.out || status=$?
              
              if [ "$status" -eq 124 ]; then
                tle=$((tle+1))
                continue
              elif [ "$status" -ne 0 ]; then
                re=$((re+1))
                continue
              fi
              
              if diff -w "$expected_file" /tmp/actual.out > /dev/null; then
                pass=$((pass+1))
              fi
            done
            
            if [ "$total" -eq 0 ]; then
              echo "⚠️ [スキップ] $filename : .in ファイルがありません"
              continue
            fi
            
            if [ "$pass" -eq "$total" ]; then
              res="AC"
            elif [ "$tle" -gt 0 ]; then
              res="TLE"
            elif [ "$re" -gt 0 ]; then
              res="RE"
            else
              res="WA"
            fi
            
            echo "✅ [結果] $filename : $res ($pass / $total)"
            RESULTS=$(jq --arg k "$filename" --arg v "$res" '.[$k] = $v' <<< "$RESULTS")
          done
          
          echo "$RESULTS" > payload.json

      # 最後のFirebase送信部分も inputs.user に変更
      - name: Update Firebase
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          USER_NAME: ${{ inputs.user }}
        run: node scripts/dist/index.js